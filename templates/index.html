<!DOCTYPE html>
<html>
<head>
    <title>Crop Prediction</title>
</head>
<body>

<h2>Farmer Crop Prediction </h2>

<form action="/predict" method="post">

<input type="number" name="nitrogen" placeholder="Nitrogen" required><br><br>

<input type="number" name="phosphorus" placeholder="Phosphorus" required><br><br>

<input type="number" name="potassium" placeholder="Potassium" required><br><br>

<input type="number" name="temperature" placeholder="Temperature" required><br><br>

<input type="number" name="humidity" placeholder="Humidity" required><br><br>

<input type="number" name="rainfall" placeholder="Rainfall" required><br><br>

<input type="number" name="area" placeholder="Area (Acres)" required><br><br>

<input type="number" name="workers" placeholder="Workers" required><br><br>

<button type="submit">Predict</button>

</form>

{% if crop %}
<h3>Recommended Crop: {{ crop }}</h3>
<h3>Estimated Cost: ₹{{ cost }}</h3>
<h3>Expected Profit: ₹{{ profit }}</h3>
{% endif %}

</body>
</html>
